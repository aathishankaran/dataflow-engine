site_name: Dataflow Engine Documentation
site_description: PySpark-based, config-driven data processing pipeline for mainframe migration.

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.integrate
  palette:
    - scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths:
            - .
          options:
            show_source: true
            show_root_heading: true
            show_root_full_path: false
            show_category_heading: true
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            members_order: source
            docstring_style: google
            docstring_section_style: spacy
            merge_init_into_class: true
            show_signature_annotations: true
            separate_signature: true
            heading_level: 2

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Developer Guide: developer-guide.md
  - CLI Reference: cli.md
  - Pipeline Flow: pipeline.md
  - Transformation Types: transformations-guide.md
  - COBOL-to-PySpark Mapping: cobol-mapping.md
  - Design Decisions: design-decisions.md
  - Test Report: test-report.md
  - API Reference:
    - run_dataflow: api/run_dataflow.md
    - config_loader: api/config_loader.md
    - runner: api/runner.md
    - transformations: api/transformations.md
    - oracle_loader: api/oracle_loader.md
    - vault: api/vault.md
    - incident: api/incident.md
